name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  server:
    name: Server Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Analyze server and app viewmodels
        run: |
          ./gradlew :server:test :server:jacocoTestReport
          ./gradlew :app:testDebugUnitTest :app:jacocoTestDebugUnitTestReport
          ./gradlew :server:sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=src/main/kotlin,../app/app/src/main/java/com/aau/saboteur/viewModels \
            -Dsonar.tests=src/test/kotlin,../app/app/src/test/java \
            -Dsonar.java.binaries=build/classes/kotlin/main,build/classes/java/main,../app/app/build/tmp/kotlin-classes/debug,../app/app/build/intermediates/javac/debug/compileDebugJavaWithJavac/classes \
            -Dsonar.junit.reportPaths=build/test-results/test,../app/app/build/test-results/testDebugUnitTest \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml,../app/app/build/reports/jacoco/jacocoTestDebugUnitTestReport/jacocoTestDebugUnitTestReport.xml
