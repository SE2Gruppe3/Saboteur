sonar.organization=se2gruppe3
sonar.projectKey=SE2Gruppe3_saboteur_app
sonar.projectName=saboteur-app

# 1. Sources and Tests configuration
# Analysis is limited to app and shared code. Server is excluded to prevent it from appearing in this report.
sonar.sources=app/app/src/main/java,shared/src/commonMain/kotlin
sonar.tests=app/app/src/test/java

# 2. Binary configuration
sonar.java.binaries=app/app/build/tmp/kotlin-classes/debug

# 3. Coverage configuration
# Only the app's Jacoco report is used.
sonar.coverage.jacoco.xmlReportPaths=app/app/build/reports/jacoco/jacocoTestDebugUnitTestReport/jacocoTestDebugUnitTestReport.xml

# 4. Coverage Exclusions
# The app source code is excluded from coverage metrics as requested.
# Shared code coverage will still be reported if present in the XML.
sonar.coverage.exclusions=app/app/src/main/java/**/*

# 5. Global Exclusions
# Completely ignore the server directory for this specific SonarCloud project.
sonar.exclusions=server/**/*

# 6. Encoding
sonar.sourceEncoding=UTF-8
