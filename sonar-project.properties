sonar.organization=se2gruppe3
sonar.projectKey=SE2Gruppe3_saboteur_app
sonar.projectName=saboteur-app

# 1. Sources and Tests configuration for the App module
# Note: App is located in app/app/ based on settings.gradle.kts
sonar.sources=app/app/src/main/java
sonar.tests=app/app/src/test/java

# 2. Binary configuration
sonar.java.binaries=app/app/build/tmp/kotlin-classes/debug,app/app/build/intermediates/javac/debug/classes

# 3. Coverage configuration
sonar.coverage.jacoco.xmlReportPaths=app/app/build/reports/jacoco/jacocoTestDebugUnitTestReport/jacocoTestDebugUnitTestReport.xml

# 4. GLOBAL EXCLUSIONS
# Exclude server and shared modules from the app analysis to prevent "new lines" issues
sonar.exclusions=server/**,shared/**,app/app/build/**
sonar.coverage.exclusions=server/**,shared/**,app/app/build/**

# 5. Encoding
sonar.sourceEncoding=UTF-8
