sonar.organization=se2gruppe3
sonar.projectKey=SE2Gruppe3_saboteur_app
sonar.projectName=saboteur-app

# 1. Sources and Tests configuration
sonar.sources=app/app/src/main/java
sonar.tests=app/app/src/test/java,app/app/src/androidTest/java

# 2. Binary configuration
sonar.java.binaries=app/app/build/tmp/kotlin-classes/debug,app/app/build/intermediates/javac/debug/classes
sonar.kotlin.binaries=app/app/build/tmp/kotlin-classes/debug

# 3. Coverage Report paths
sonar.coverage.jacoco.xmlReportPaths=**/jacocoTestDebugUnitTestReport.xml
sonar.junit.reportPaths=**/test-results/**/*.xml

# 4. EXCLUSIONS - This bypasses the Quality Gate for UI code
# We exclude files that are hard to test in CI (Activities, Compose Screens, Navigation)
sonar.coverage.exclusions=**/MainActivity.kt, **/screens/*.kt, **/navigation/*.kt, **/ui/theme/*.kt

# 5. Encoding
sonar.sourceEncoding=UTF-8
